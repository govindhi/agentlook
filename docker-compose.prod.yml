services:
  backend:
    build: ./backend
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AGENTLOOK_AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ~/.aws:/root/.aws:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
