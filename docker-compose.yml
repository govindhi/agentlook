services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AGENTLOOK_AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ~/.aws:/root/.aws:ro

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
